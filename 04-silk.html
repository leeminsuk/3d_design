<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비단 — Silk</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=IBM+Plex+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #16130f; }
  canvas { display: block; }
  .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 1;
              background: radial-gradient(ellipse at 50% 45%, transparent 40%, rgba(10,8,6,.55) 100%); }
  .ui { position: fixed; inset: 0; pointer-events: none; z-index: 2;
        font-family: 'Song Myung', serif; color: #e9e2d5; }
  .title { position: absolute; left: 48px; top: 48px; }
  .title h1 { font-size: clamp(34px, 5vw, 54px); font-weight: 400;
              letter-spacing: .55em; margin-right: -.55em; }
  .title .en { margin-top: 10px; font-family: 'IBM Plex Mono', monospace;
               font-size: 10px; letter-spacing: .6em;
               color: #8d8371; text-transform: uppercase; }
  .caption { position: absolute; left: 50%; bottom: 44px; transform: translateX(-50%);
             text-align: center; font-size: 13px; line-height: 2.1; color: #a99e8a;
             letter-spacing: .1em; word-break: keep-all; width: max-content;
             max-width: 90vw; }
  .fallback { position: fixed; inset: 0; display: none; place-content: center;
              text-align: center; color: #e9e2d5; background: #16130f;
              font-family: 'Song Myung', serif; padding: 24px; line-height: 2; z-index: 3; }
  @media (max-width: 640px) {
    .title { top: 34px; }
    .caption { bottom: 30px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="vignette"></div>
<div class="ui">
  <div class="title">
    <h1>비단</h1>
    <div class="en">Silk · 緋緞</div>
  </div>
  <div class="caption">바람이 스치면, 천은 빛으로 대답한다<br>마우스를 움직여 바람을 일으켜 보세요</div>
</div>
<div class="fallback" id="fallback">
  <div>이 페이지는 WebGL이 필요합니다.<br>최신 브라우저에서 다시 열어 주세요.</div>
</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ antialias: true });
} catch (e) {
  document.getElementById('fallback').style.display = 'grid';
  throw e;
}
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x16130f);
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 50);
const CAMX = 2.4;
camera.position.set(CAMX, -1.3, 8.8);

/* 환경광: 진주광의 원천 */
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.environmentIntensity = 0.5;

const key = new THREE.DirectionalLight(0xfff2dd, 2.4);
key.position.set(4, 6, 5);
scene.add(key);
const back = new THREE.DirectionalLight(0x8fb0ff, 1.1);
back.position.set(-5, -2, -4);
scene.add(back);

/* ── 클로스: 베를레 시뮬레이션 ────────────────────────── */
const W = 46, H = 30;                       /* 그리드 분할 */
const SIZE_X = 7.2, SIZE_Y = 4.7;
const N = (W + 1) * (H + 1);
const pos = new Float32Array(N * 3);
const prev = new Float32Array(N * 3);
const pinned = new Uint8Array(N);

function idx(x, y) { return y * (W + 1) + x; }

for (let y = 0; y <= H; y++) {
  for (let x = 0; x <= W; x++) {
    const i = idx(x, y) * 3;
    pos[i]     = (x / W - 0.5) * SIZE_X;
    pos[i + 1] = (0.5 - y / H) * SIZE_Y + 0.6;
    pos[i + 2] = 0;
    prev[i] = pos[i]; prev[i + 1] = pos[i + 1]; prev[i + 2] = pos[i + 2];
  }
}
/* 고정점: 좌상·우상 모서리 + 상단 중앙 한 점 (걸린 스카프) */
pinned[idx(0, 0)] = 1;
pinned[idx(W, 0)] = 1;

/* 제약: 구조(가로·세로) + 전단(대각) */
const cons = [];
function addCon(a, b) {
  const ax = pos[a*3]-pos[b*3], ay = pos[a*3+1]-pos[b*3+1], az = pos[a*3+2]-pos[b*3+2];
  cons.push(a, b, Math.sqrt(ax*ax + ay*ay + az*az));
}
for (let y = 0; y <= H; y++) for (let x = 0; x <= W; x++) {
  if (x < W) addCon(idx(x, y), idx(x + 1, y));
  if (y < H) addCon(idx(x, y), idx(x, y + 1));
  if (x < W && y < H) { addCon(idx(x, y), idx(x+1, y+1)); addCon(idx(x+1, y), idx(x, y+1)); }
}
const CN = cons.length / 3;

/* 지오메트리 */
const geo = new THREE.PlaneGeometry(SIZE_X, SIZE_Y, W, H);
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
const mat = new THREE.MeshPhysicalMaterial({
  color: 0x76284e,                          /* 깊은 자주빛 비단 */
  metalness: 0.0, roughness: 0.42,
  iridescence: 1.0, iridescenceIOR: 1.6,
  iridescenceThicknessRange: [180, 800],
  sheen: 1.0, sheenColor: 0x9df0dc, sheenRoughness: 0.35,
  side: THREE.DoubleSide
});
const cloth = new THREE.Mesh(geo, mat);
scene.add(cloth);

/* ── 마우스 → 바람 ────────────────────────────────────── */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2(9, 9);
const mouseWorld = new THREE.Vector3(999, 999, 0);
let mouseVel = new THREE.Vector3();
const lastMouse = new THREE.Vector3(999, 999, 0);
const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

addEventListener('pointermove', e => {
  ndc.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(ndc, camera);
  const hit = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(plane, hit)) {
    if (lastMouse.x < 900) {
      mouseVel.subVectors(hit, lastMouse).multiplyScalar(0.5);
      if (mouseVel.length() > 1.2) mouseVel.setLength(1.2);
    }
    lastMouse.copy(hit);
    mouseWorld.copy(hit);
  }
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ── 시뮬레이션 ───────────────────────────────────────── */
const GRAV = -2.6, DAMP = 0.985;
const t0 = performance.now();
let lastT = 0;

function simulate(t, dt) {
  /* 자연풍: 낮은 주파수의 흐름 + 돌풍 */
  const gust = Math.max(0, Math.sin(t * 0.4) * Math.sin(t * 0.23 + 1.7));
  const wx = 0.35 + Math.sin(t * 0.5) * 0.4 + gust * 1.6;
  const wz = Math.sin(t * 0.34 + 2.0) * 1.6 * (1.0 + gust * 1.2);

  const dt2 = dt * dt;
  for (let i = 0; i < N; i++) {
    if (pinned[i]) continue;
    const j = i * 3;
    const px = pos[j], py = pos[j+1], pz = pos[j+2];

    /* 지점별 위상차 바람 */
    let fx = wx * (0.6 + 0.4 * Math.sin(py * 1.3 + t * 1.1));
    let fy = GRAV + Math.sin(px * 0.9 + t * 0.9) * 0.35;
    let fz = wz * (0.6 + 0.4 * Math.sin(px * 1.1 + t * 0.8));

    /* 마우스 바람: 커서 주변에 속도 방향의 힘 */
    const dx = px - mouseWorld.x, dy = py - mouseWorld.y;
    const d2 = dx * dx + dy * dy;
    if (d2 < 4.5) {
      const s = Math.exp(-d2 * 0.7) * 60;
      fx += mouseVel.x * s;
      fy += mouseVel.y * s;
      fz += (Math.random() - 0.5) * mouseVel.length() * s * 0.6;
    }

    const nx = px + (px - prev[j])     * DAMP + fx * dt2;
    const ny = py + (py - prev[j + 1]) * DAMP + fy * dt2;
    const nz = pz + (pz - prev[j + 2]) * DAMP + fz * dt2;
    prev[j] = px; prev[j + 1] = py; prev[j + 2] = pz;
    pos[j] = nx; pos[j + 1] = ny; pos[j + 2] = nz;
  }

  /* 제약 반복 */
  for (let iter = 0; iter < 4; iter++) {
    for (let c = 0; c < CN; c++) {
      const a = cons[c * 3], b = cons[c * 3 + 1], rest = cons[c * 3 + 2];
      const ja = a * 3, jb = b * 3;
      let dx = pos[jb] - pos[ja], dy = pos[jb+1] - pos[ja+1], dz = pos[jb+2] - pos[ja+2];
      const d = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1e-6;
      const diff = (d - rest) / d * 0.5;
      dx *= diff; dy *= diff; dz *= diff;
      const pa = pinned[a], pb = pinned[b];
      if (!pa && !pb) {
        pos[ja] += dx; pos[ja+1] += dy; pos[ja+2] += dz;
        pos[jb] -= dx; pos[jb+1] -= dy; pos[jb+2] -= dz;
      } else if (pa && !pb) {
        pos[jb] -= dx*2; pos[jb+1] -= dy*2; pos[jb+2] -= dz*2;
      } else if (!pa && pb) {
        pos[ja] += dx*2; pos[ja+1] += dy*2; pos[ja+2] += dz*2;
      }
    }
  }

  mouseVel.multiplyScalar(0.9);   /* 바람 잦아듦 */
}

const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

function tick() {
  const t = (performance.now() - t0) / 1000;
  let dt = Math.min(t - lastT, 1 / 30);
  lastT = t;

  /* 서브스텝 2회로 안정화 */
  simulate(t, dt / 2);
  simulate(t + dt / 2, dt / 2);

  geo.attributes.position.needsUpdate = true;
  geo.computeVertexNormals();

  const targetX = CAMX + (ndc.x < 5 ? ndc.x * 0.5 : 0);
  camera.position.x += (targetX - camera.position.x) * 0.02;
  camera.lookAt(0, -0.1, 0);

  renderer.render(scene, camera);
}

if (reduceMotion) {
  /* 정지: 몇 스텝만 늘어뜨리고 멈춘 프레임 */
  for (let i = 0; i < 90; i++) simulate(i * 0.016, 0.016);
  geo.attributes.position.needsUpdate = true;
  geo.computeVertexNormals();
  renderer.render(scene, camera);
} else {
  renderer.setAnimationLoop(tick);
}
</script>
</body>
</html>
